<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Math Fun for Kids!</title>
  <link rel="stylesheet" href="./style.css">
</head>

<body>
  <div id="app" class="card">
    <!-- Header with Hamburger Menu -->
    <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
      <h3 style="margin: 0; display: none; color: var(--primary);" id="module-title">Math Fun</h3>
      <div id="hamburger-menu" style="cursor: pointer; font-size: 1.5rem; color: var(--primary); padding: 5px;">
        ☰
      </div>
    </header>

    <!-- Sidebar Menu Overlay -->
    <div id="sidebar-overlay" class="sidebar-overlay">
      <div class="sidebar">
        <div style="text-align: right; margin-bottom: 20px;">
          <span id="close-sidebar" style="cursor: pointer; font-size: 1.5rem; color: var(--primary);">✖</span>
        </div>
        <h2 style="text-align: left; font-size: 1.5rem;">Modules</h2>
        <ul style="list-style: none; padding: 0;">
          <li class="menu-item active-module" data-module="math">Math Operations ➕</li>
          <li class="menu-item" data-module="english">English Numbers 📝</li>
        </ul>
      </div>
    </div>

    <!-- Onboarding Screen -->
    <div id="onboarding-screen" class="screen">
      <h1>Welcome! 🌟</h1>

      <div id="existing-users-section" style="display: none; width: 100%; margin-bottom: 20px;">
        <p style="text-align: center; margin-bottom: 10px;">Who is playing today?</p>
        <div id="users-list-container"
          style="display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-bottom: 20px;">
          <!-- User buttons will be injected here -->
        </div>
        <p style="text-align: center; font-size: 0.9rem; color: #666;">...or enter a new name:</p>
      </div>

      <div class="form-group">
        <input type="text" id="user-name-input" placeholder="Your name here..." autofocus>
      </div>
      <button id="save-user-btn" class="btn-primary">Let's Start! 🎈</button>
    </div>

    <!-- Welcome/Setup Screen -->
    <div id="setup-screen" class="screen">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 id="welcome-title" style="margin: 0;">Math Fun! 🎨</h1>
        <button id="switch-user-btn" class="btn-secondary" style="padding: 8px 15px; font-size: 0.9rem;">Change User
          👤</button>
      </div>
      <div class="form-group">
        <label for="operation">Choose Operation:</label>
        <select id="operation">
          <option value="addition">Addition (+)</option>
          <option value="subtraction">Subtraction (-)</option>
          <option value="multiplication">Multiplication (×)</option>
          <option value="division">Division (÷)</option>
        </select>
      </div>
      <div class="form-group">
        <label for="count">How many questions?</label>
        <input type="number" id="count" value="10" min="1" max="50">
      </div>
      <div style="display: flex; gap: 15px; margin-bottom: 25px;">
        <div class="form-group" style="flex: 1; margin-bottom: 0;">
          <label for="digits1">Digits (Num 1)</label>
          <input type="number" id="digits1" value="1" min="1" max="5">
        </div>
        <div class="form-group" style="flex: 1; margin-bottom: 0;">
          <label for="digits2">Digits (Num 2)</label>
          <input type="number" id="digits2" value="1" min="1" max="5">
        </div>
      </div>
      <button id="start-btn" class="btn-primary">Let's Play! 🚀</button>
      <button id="view-history-btn" class="btn-secondary">View History 📜</button>
    </div>

    <!-- English Setup Screen -->
    <div id="english-setup-screen" class="screen">
      <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
        <h1 id="welcome-title-english" style="margin: 0;">English Numbers! 📝</h1>
        <button id="switch-user-btn-english" class="btn-secondary" style="padding: 8px 15px; font-size: 0.9rem;">Change
          User 👤</button>
      </div>
      <div class="form-group">
        <label for="english-count">How many questions?</label>
        <input type="number" id="english-count" value="10" min="1" max="50">
      </div>
      <div class="form-group">
        <label for="english-digits">Number of Digits</label>
        <input type="number" id="english-digits" value="2" min="1" max="5">
      </div>
      <button id="start-english-btn" class="btn-primary">Let's Practice! 🚀</button>
      <button id="view-history-english-btn" class="btn-secondary">View History 📜</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="screen">
      <h2 id="current-step">Question 1 of 10</h2>
      <div class="progress-bar">
        <div id="progress-fill" class="progress-fill"></div>
      </div>
      <div id="quiz-warning"
        style="color: var(--primary); font-weight: bold; text-align: center; margin-bottom: 10px; min-height: 1.5em;">
      </div>
      <div class="exercise-container">
        <div id="question-text" class="question">12 + 5 = ?</div>
        <div
          style="display: flex; gap: 10px; justify-content: center; align-items: center; margin-bottom: 30px; width: 100%;">
          <div style="width: 100%;">
            <label for="answer-input" style="font-size: 0.8rem; margin-bottom: 5px;">Result</label>
            <input type="text" id="answer-input" class="answer-input" style="margin: 0;" placeholder="?"
              autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false" data-lpignore="true">

          </div>
          <div id="remainder-container" style="display: none;">
            <label for="remainder-input" style="font-size: 0.8rem; margin-bottom: 5px;">Remainder</label>
            <input type="number" id="remainder-input" class="answer-input" style="margin: 0; width: 120px;"
              placeholder="R?" autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false">
          </div>
        </div>
        <button id="next-btn" class="btn-primary">Next! →</button>
      </div>
    </div>

    <!-- Results Screen -->
    <div id="results-screen" class="screen">
      <h1>Great Job! 🎉</h1>
      <div id="score-summary" style="font-size: 2rem; text-align: center; margin-bottom: 20px;">
        You got 8/10!
      </div>
      <div id="results-details" style="margin-bottom: 30px;">
        <!-- Items will be injected here -->
      </div>
      <button id="play-again-btn" class="btn-primary">Play Again! 🔄</button>
      <button id="home-btn" class="btn-secondary">Back Home 🏠</button>
    </div>

    <!-- History Screen -->
    <div id="history-screen" class="screen">
      <h1>Your History 🏆</h1>
      <div id="history-list" class="history-list">
        <!-- History items -->
      </div>
      <button id="clear-history-btn" class="btn-accent" style="margin-top: 20px;">Clear All History 🗑️</button>
      <button id="history-home-btn" class="btn-secondary" style="margin-top: 10px;">Back Home 🏠</button>
    </div>
  </div>

  <!-- Footer Credit -->
  <div class="footer-credit">
    <span>Developed by <strong>AdhesDev</strong></span>
  </div>

  <script type="module" src="/main.js"></script>
</body>

</html>
